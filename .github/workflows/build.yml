
name: Build APK
on:
push:
branches: [ main ]
jobs:
build:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-java@v3
with:
distribution: 'zulu'
java-version: '17'
- uses: subosito/flutter-action@v2
with:
flutter-version: '3.22.0'
channel: 'stable'
- name: Buat folder Android
run: flutter create . --project-name smarttools --org id.smarttools --platforms android
- name: Fix Kotlin
run: sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/" android/build.gradle
- name: Pasang AndroidManifest AdMob (versi fix)
run: |
echo '' | base64 -d > android/app/src/main/AndroidManifest.xml
- name: Pasang Unit ID Banner
run: sed -i "s|ca-app-pub-3940256099942544/6300978111|ca-app-pub-4959669273061829/5993867782|g" lib/main.dart
- run: flutter pub get
- run: flutter build apk --release
- uses: actions/upload-artifact@v4
with:
name: smarttools-apk
path: build/app/outputs/flutter-apk/app-release.apk
