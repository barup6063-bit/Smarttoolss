name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter create . --project-name smarttools --org id.smarttools --platforms android
      - run: sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/" android/build.gradle
      - run: sed -i '/google_mobile_ads/d' pubspec.yaml
      - run: sed -i '/MobileAds/d' lib/main.dart
      - run: sed -i '/import.*google_mobile_ads/d' lib/main.dart
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: smarttools-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
